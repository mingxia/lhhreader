<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>连环画双页阅读器</title>
    <link rel="stylesheet" href="./reader.css" />
  </head>
  <body>
    <div class="reader-shell" id="readerShell">
      <header class="topbar ui-layer" id="topbar">
        <div class="brand">连环画书房</div>
        <div class="book-meta" id="bookMeta">示例连环画（可导入 PDF）</div>
        <label class="btn file-upload" for="pdfInput">导入 PDF</label>
        <input id="pdfInput" type="file" accept="application/pdf" hidden />
      </header>

      <main class="stage" id="stage" aria-label="双页阅读区域">
        <button class="turn-zone turn-left" id="prevBtn" aria-label="上一跨页"></button>

        <section class="book" id="book">
          <div class="book-thickness book-thickness-left" aria-hidden="true"></div>

          <article class="page page-left" id="leftPage">
            <img id="leftImage" alt="左页" />
            <span class="page-number" id="leftNumber"></span>
          </article>

          <div class="book-spine" aria-hidden="true"></div>

          <article class="page page-right" id="rightPage">
            <img id="rightImage" alt="右页" />
            <span class="page-number" id="rightNumber"></span>
          </article>

          <div class="book-thickness book-thickness-right" aria-hidden="true"></div>
        </section>

        <button class="turn-zone turn-right" id="nextBtn" aria-label="下一跨页"></button>
      </main>

      <footer class="toolbar ui-layer" id="toolbar">
        <button class="btn" id="toggleUiBtn">隐藏界面</button>
        <button class="btn" id="zoomOutBtn">缩小</button>
        <span class="zoom-label" id="zoomLabel">100%</span>
        <button class="btn" id="zoomInBtn">放大</button>
        <button class="btn" id="zoomResetBtn">重置</button>
        <div class="page-status" id="pageStatus">1–2 / 12</div>
      </footer>
    </div>

    <script type="module" src="./reader.js"></script>
  </body>
</html>
